id: thailand_sugar
name: "Thailand – sukkerrør"
commodity: "sukker"

sources:
  ndvi: nasa_modis
  weather: open_meteo

growing:
  base_temp_c: 18
  heat_stress_temp_c: 35

# Sukkerrør i Thailand (nordlige halvkule):
#   - Vekst (regnsesong/monsun): mai–nov
#   - Høsting (knusesesong): des–apr (topp jan–feb)
# Kilde: Thai sukkerindustri / Bonsucro / S&P Global.
cycle:
  phases:
    - name: "Vekst (regnsesong)"
      months: [5, 6, 7, 8, 9, 10, 11]
      color: "#22c55e"
    - name: "Høsting (knusesesong)"
      months: [12, 1, 2, 3, 4]
      color: "#f59e0b"

